name: Release Helm Chart

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-chart:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Run script syntax tests
        shell: bash
        run: |
          set -euo pipefail
          sh ./scripts/test/run-syntax-check.sh .

      - name: Run mock integration tests
        shell: bash
        run: |
          set -euo pipefail
          sh ./tests/run-mock-tests.sh

      - name: Bump chart patch version
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          current=$(awk '/^version:/ {print $2; exit}' Chart.yaml)
          IFS='.' read -r major minor patch <<< "$current"
          new_version="${major}.${minor}.$((patch + 1))"

          sed -i.bak -E "s/^version: .*/version: ${new_version}/" Chart.yaml
          rm -f Chart.yaml.bak

          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Print release version
        shell: bash
        run: |
          set -euo pipefail
          echo "Released chart version: ${{ steps.bump.outputs.new_version }}"
          {
            echo "## Helm Chart Release"
            echo ""
            echo "- Version: ${{ steps.bump.outputs.new_version }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lint chart
        run: helm lint .

      - name: Package chart
        run: helm package . --destination docs/charts

      - name: Rebuild chart index
        shell: bash
        run: |
          set -euo pipefail
          repo_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/charts"
          helm repo index docs/charts --url "$repo_url" --merge docs/charts/index.yaml

      - name: Commit and push release artifacts
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Chart.yaml docs/charts

          if git diff --cached --quiet; then
            echo "No release changes to commit"
            exit 0
          fi

          git commit -m "chore(release): chart v${{ steps.bump.outputs.new_version }} [skip ci]"
          git push
