apiVersion: batch/v1
kind: CronJob
metadata:
  name: k3s-alert
spec:
  schedule: "{{ include "k3s-alert.cronSchedule" . }}"
  concurrencyPolicy: {{ .Values.cronJob.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.cronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronJob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.cronJob.activeDeadlineSeconds }}
      template:
        spec:
          serviceAccountName: k3s-alert
          restartPolicy: OnFailure
          containers:
            - name: alert
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command: ["/bin/sh", "/scripts/check.sh"]
              env:
                - name: LOG_LEVEL
                  value: "{{ .Values.logLevel }}"
{{- if .Values.channels.email.enabled }}
                - name: SMTP_HOST
                  value: "{{ .Values.channels.email.host }}"
                - name: SMTP_PORT
                  value: "{{ .Values.channels.email.port }}"
                - name: SMTP_FROM
                  value: "{{ .Values.channels.email.from }}"
                - name: SMTP_TO
{{- if kindIs "slice" .Values.channels.email.to }}
                  value: "{{ join "," .Values.channels.email.to }}"
{{- else }}
                  value: "{{ .Values.channels.email.to }}"
{{- end }}
                - name: SMTP_LOGIN_OPTIONS
                  value: "{{ .Values.channels.email.loginOptions }}"
                - name: SMTP_MAIL_FORMAT
                  value: "{{ .Values.channels.email.mailFormat }}"
                - name: SMTP_SUBJECT_PREFIX
                  value: "{{ .Values.channels.email.subjectPrefix }}"
                - name: SMTP_MAX_LINES_PER_SECTION
                  value: "{{ .Values.channels.email.maxLinesPerSection }}"
                - name: ALERT_WARNING_EVENTS_SURGE
                  value: "{{ .Values.alerts.warningEventsSurge }}"
                - name: ALERT_WARNING_EVENTS_SURGE_THRESHOLD
                  value: "{{ .Values.alerts.warningEventsSurgeThreshold }}"
                - name: ALERT_PENDING_UNSCHEDULABLE_MIN_PODS
                  value: "{{ .Values.alerts.pendingUnschedulableMinPods }}"
                - name: SMTP_USERNAME
{{- if kindIs "map" .Values.channels.email.username }}
{{ toYaml .Values.channels.email.username | nindent 18 }}
{{- else }}
                  value: "{{ default "" .Values.channels.email.username }}"
{{- end }}
                - name: SMTP_PASSWORD
{{- if kindIs "map" .Values.channels.email.password }}
{{ toYaml .Values.channels.email.password | nindent 18 }}
{{- else }}
                  value: "{{ default "" .Values.channels.email.password }}"
{{- end }}
{{- end }}
{{- if .Values.channels.webhook.enabled }}
                - name: WEBHOOK_URL
{{- if kindIs "map" .Values.channels.webhook.url }}
{{ toYaml .Values.channels.webhook.url | nindent 18 }}
{{- else }}
                  value: "{{ default "" .Values.channels.webhook.url }}"
{{- end }}
{{- end }}
              volumeMounts:
                - name: script
                  mountPath: /scripts
              resources:
{{ toYaml .Values.resources | indent 16 }}
          volumes:
            - name: script
              configMap:
                name: k3s-alert-script
                defaultMode: 0755
