apiVersion: v1
kind: ConfigMap
metadata:
  name: k3s-alert-script
data:
  check.sh: |
    #!/bin/sh
    set -eu

    STATE_FILE="/tmp/last_alert"
    LAST_SENT_FILE="/tmp/last_sent"
    BACKOFF_FILE="/tmp/alert_backoff"
    EMAIL_RATE_FILE="/tmp/email_rate_limit"
    COOLDOWN={{ .Values.cooldownSeconds }}
    BACKOFF_ENABLED={{ .Values.backoff.enabled }}
    BACKOFF_FILTER_MODE="{{ .Values.backoff.filterMode }}"
    BACKOFF_BASE_DELAY={{ .Values.backoff.baseDelaySeconds }}
    BACKOFF_FACTOR={{ .Values.backoff.factor }}
    BACKOFF_MAX_DELAY={{ .Values.backoff.maxDelaySeconds }}
    RATE_LIMIT_ENABLED={{ .Values.rateLimit.enabled }}
    RATE_LIMIT_PERIOD={{ .Values.rateLimit.periodSeconds }}
    RATE_LIMIT_MAX_EMAILS={{ .Values.rateLimit.maxEmails }}
    POD_RESTART_THRESHOLD={{ .Values.alerts.podRestartThreshold }}
    WARNING_EVENTS_SURGE="${ALERT_WARNING_EVENTS_SURGE:-false}"
    WARNING_EVENTS_SURGE_THRESHOLD="${ALERT_WARNING_EVENTS_SURGE_THRESHOLD:-25}"
    PENDING_UNSCHEDULABLE_MIN_PODS="${ALERT_PENDING_UNSCHEDULABLE_MIN_PODS:-1}"
    DEPLOYMENT_HEALTH_TARGETS="{{ join "," .Values.deploymentsHealthCheck.targets }}"
    DEPLOYMENT_HEALTH_MIN_READY_PERCENT={{ .Values.deploymentsHealthCheck.settings.minReadyPercent }}
    DEPLOYMENT_HEALTH_INCLUDE_ZERO_DESIRED={{ .Values.deploymentsHealthCheck.settings.includeZeroDesired }}
    DEPLOYMENT_HEALTH_MAX_REPORTED_LINES={{ .Values.deploymentsHealthCheck.settings.maxReportedLines }}
    DEPLOYMENT_HEALTH_INCLUDE_MISSING_TARGETS={{ .Values.deploymentsHealthCheck.settings.includeMissingTargets }}
    RUN_START_TS=$(date +%s)
    API_CALLS=0

    ALERTS=""
    RESTART_ALERT_TARGETS=""
    EXCLUDE_NAMESPACES="{{ join "|" .Values.filters.excludeNamespaces }}"

    run_kubectl() {
      API_CALLS=$((API_CALLS + 1))
      kubectl "$@" 2>/dev/null || true
    }

    normalize_non_negative_int() {
      RAW="$1"
      FALLBACK="$2"
      case "$RAW" in
        ''|*[!0-9]*) echo "$FALLBACK" ;;
        *) echo "$RAW" ;;
      esac
    }

    filter_excluded_namespaces() {
      INPUT="$1"
      if [ -z "$EXCLUDE_NAMESPACES" ]; then
        printf '%s' "$INPUT"
      else
        printf '%s\n' "$INPUT" | grep -Ev "^($EXCLUDE_NAMESPACES)[[:space:]]" || true
      fi
    }

    count_non_empty_lines() {
      printf '%s\n' "$1" | sed '/^$/d' | wc -l | tr -d ' '
    }

    add_alert_section() {
      SECTION_NAME="$1"
      SECTION_BODY="$2"
      [ -z "$SECTION_BODY" ] && return 0
      ALERTS="$ALERTS\n[$SECTION_NAME]\n$SECTION_BODY"
    }

    emit_runtime_metrics() {
      END_TS=$(date +%s)
      DURATION_SEC=$((END_TS - RUN_START_TS))
      POD_ROWS=$(count_non_empty_lines "${PODS:-}")
      NODE_ROWS=$(count_non_empty_lines "${NODES_STATUS:-}")
      WARN_ROWS=$(count_non_empty_lines "${WARNING_EVENTS:-}")
      echo "Run metrics: durationSec=$DURATION_SEC apiCalls=$API_CALLS podRows=$POD_ROWS nodeRows=$NODE_ROWS warningEventRows=$WARN_ROWS totalAlerts=${TOTAL_COUNT:-0}"
    }

    PENDING_UNSCHEDULABLE_MIN_PODS=$(normalize_non_negative_int "$PENDING_UNSCHEDULABLE_MIN_PODS" "1")
    WARNING_EVENTS_SURGE_THRESHOLD=$(normalize_non_negative_int "$WARNING_EVENTS_SURGE_THRESHOLD" "25")
    DEPLOYMENT_HEALTH_MIN_READY_PERCENT=$(normalize_non_negative_int "$DEPLOYMENT_HEALTH_MIN_READY_PERCENT" "100")
    DEPLOYMENT_HEALTH_MAX_REPORTED_LINES=$(normalize_non_negative_int "$DEPLOYMENT_HEALTH_MAX_REPORTED_LINES" "10")

    echo "Running checks..."

    PODS=$(run_kubectl get pods -A --no-headers)
    NODES_STATUS=$(run_kubectl get nodes -o jsonpath='{range .items[*]}{.metadata.name}{"|"}{range .status.conditions[*]}{.type}{"="}{.status}{";"}{end}{"\n"}{end}')
    PODS=$(filter_excluded_namespaces "$PODS")

    WARNING_EVENTS=""
    {{- if or .Values.alerts.warningEventsSurge .Values.alerts.probeFailures }}
    WARNING_EVENTS=$(run_kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp --no-headers | tail -n 200 || true)
    WARNING_EVENTS=$(filter_excluded_namespaces "$WARNING_EVENTS")
    {{- end }}

    run_app_checks() {
      {{- if .Values.alerts.podCrashLoop }}
      CRASH=$(echo "$PODS" | grep -E "CrashLoopBackOff" || true)
      add_alert_section "CrashLoop" "$CRASH"
      {{- end }}

      {{- if .Values.alerts.podImagePullError }}
      IMG=$(echo "$PODS" | grep -E "ImagePullBackOff|ErrImagePull" || true)
      add_alert_section "ImagePull" "$IMG"
      {{- end }}

      {{- if .Values.alerts.podError }}
      ERR=$(echo "$PODS" | grep -E "Error|Failed" || true)
      add_alert_section "Errors" "$ERR"
      {{- end }}

      {{- if .Values.alerts.podOOMKilled }}
      OOM=$(run_kubectl get pods -A -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{" "}{range .status.containerStatuses[*]}{.name}{":"}{.state.terminated.reason}{":"}{.lastState.terminated.reason}{";"}{end}{"\n"}{end}' | grep -E 'OOMKilled' || true)
      OOM=$(filter_excluded_namespaces "$OOM")
      add_alert_section "OOMKilled" "$OOM"
      {{- end }}

      {{- if .Values.alerts.podEvicted }}
      EVICTED=$(echo "$PODS" | grep -E "[[:space:]]Evicted[[:space:]]" || true)
      add_alert_section "Evicted" "$EVICTED"
      {{- end }}

      {{- if .Values.alerts.pendingUnschedulable }}
      UNSCHEDULABLE=$(run_kubectl get pods -A --field-selector=status.phase=Pending -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"|"}{range .status.conditions[*]}{.type}{"="}{.status}{":"}{.reason}{";"}{end}{"\n"}{end}' | awk -F'|' '$2 ~ /PodScheduled=False:Unschedulable/ {print $1" "$2}' || true)
      UNSCHEDULABLE=$(filter_excluded_namespaces "$UNSCHEDULABLE")
      UNSCHEDULABLE_COUNT=$(count_non_empty_lines "$UNSCHEDULABLE")
      if [ "$UNSCHEDULABLE_COUNT" -ge "$PENDING_UNSCHEDULABLE_MIN_PODS" ] && [ "$UNSCHEDULABLE_COUNT" -gt 0 ]; then
        add_alert_section "PendingUnschedulable" "$UNSCHEDULABLE"
      fi
      {{- end }}

      {{- if .Values.alerts.probeFailures }}
      PROBE_FAILS=$(echo "$WARNING_EVENTS" | grep -Ei 'Readiness probe failed|Liveness probe failed' || true)
      add_alert_section "ProbeFailures" "$PROBE_FAILS"
      {{- end }}

      {{- if .Values.alerts.warningEventsSurge }}
      WARN_COUNT=$(count_non_empty_lines "$WARNING_EVENTS")
      if [ "$WARNING_EVENTS_SURGE" = "true" ] && [ "$WARN_COUNT" -ge "$WARNING_EVENTS_SURGE_THRESHOLD" ]; then
        add_alert_section "WarningEventSurge" "$(printf '%s\n' "$WARNING_EVENTS" | tail -n 20)"
      fi
      {{- end }}

      if [ "$POD_RESTART_THRESHOLD" -ge 0 ]; then
        RESTART_CANDIDATES=$(echo "$PODS" | awk -v threshold="$POD_RESTART_THRESHOLD" '
          {
            ns=$1
            pod=$2
            status=$4
            restarts=$5
            gsub(/[^0-9]/, "", restarts)
            if (restarts == "") {
              restarts=0
            }
            if ((restarts + 0) > threshold) {
              print ns" "pod" "status" "restarts
            }
          }
        ' || true)

        if [ -n "$RESTART_CANDIDATES" ]; then
          NEW_RESTART_ALERTS=""
          RESTART_SCAN_FILE=$(mktemp)
          printf '%s\n' "$RESTART_CANDIDATES" > "$RESTART_SCAN_FILE"
          while IFS= read -r candidate; do
            [ -z "$candidate" ] && continue
            NS=$(echo "$candidate" | awk '{print $1}')
            POD=$(echo "$candidate" | awk '{print $2}')
            NOTIFIED=$(run_kubectl get pod "$POD" -n "$NS" -o jsonpath="{.metadata.annotations['k3s-alert/restart-threshold-notified']}")
            if [ "$NOTIFIED" = "true" ]; then
              continue
            fi
            if [ -z "$NEW_RESTART_ALERTS" ]; then
              NEW_RESTART_ALERTS="$candidate"
            else
              NEW_RESTART_ALERTS="$NEW_RESTART_ALERTS\n$candidate"
            fi

            if [ -z "$RESTART_ALERT_TARGETS" ]; then
              RESTART_ALERT_TARGETS="$NS|$POD"
            else
              RESTART_ALERT_TARGETS="$RESTART_ALERT_TARGETS\n$NS|$POD"
            fi
          done < "$RESTART_SCAN_FILE"
          rm -f "$RESTART_SCAN_FILE"

          add_alert_section "PodRestarts" "$NEW_RESTART_ALERTS"
        fi
      fi
    }

    run_cluster_checks() {
      {{- if .Values.alerts.nodeNotReady }}
      NODE_NOT_READY=$(echo "$NODES_STATUS" | awk -F'|' '$2 !~ /Ready=True/ {print $1"|"$2}' || true)
      add_alert_section "NodeNotReady" "$NODE_NOT_READY"
      {{- end }}

      {{- if .Values.alerts.nodePressure }}
      NODE_PRESSURE=$(echo "$NODES_STATUS" | awk -F'|' '
        {
          if ($2 ~ /MemoryPressure=True/ || $2 ~ /DiskPressure=True/ || $2 ~ /PIDPressure=True/) {
            print $0
          }
        }
      ' || true)
      add_alert_section "NodePressure" "$NODE_PRESSURE"
      {{- end }}

      {{- if .Values.alerts.deploymentsHealthCheck }}
      if [ -n "$DEPLOYMENT_HEALTH_TARGETS" ]; then
        DEPLOYMENTS_ALL=$(run_kubectl get deployments -A --no-headers)
        DEPLOYMENTS_HEALTH_REPORT=$(printf '%s' "$DEPLOYMENT_HEALTH_TARGETS" | tr ',' '\n' | sed '/^$/d' | while IFS= read -r target; do
          NS=$(echo "$target" | cut -d'/' -f1)
          DEPLOYMENT_NAME=$(echo "$target" | cut -d'/' -f2-)
          [ -z "$NS" ] && continue
          [ -z "$DEPLOYMENT_NAME" ] && continue

          MATCHING_DEPLOYMENT=$(echo "$DEPLOYMENTS_ALL" | awk -v ns="$NS" -v dep="$DEPLOYMENT_NAME" '$1 == ns && $2 == dep {print; exit}')
          if [ -z "$MATCHING_DEPLOYMENT" ]; then
            if [ "$DEPLOYMENT_HEALTH_INCLUDE_MISSING_TARGETS" = "true" ]; then
              echo "$NS/$DEPLOYMENT_NAME missing"
            fi
            continue
          fi

          READY_COLUMN=$(echo "$MATCHING_DEPLOYMENT" | awk '{print $3}')
          READY_REPLICAS=$(echo "$READY_COLUMN" | cut -d'/' -f1)
          DESIRED_REPLICAS=$(echo "$READY_COLUMN" | cut -d'/' -f2)
          READY_REPLICAS=$(normalize_non_negative_int "$READY_REPLICAS" "0")
          DESIRED_REPLICAS=$(normalize_non_negative_int "$DESIRED_REPLICAS" "0")

          UNHEALTHY=0
          REASON=""
          if [ "$DESIRED_REPLICAS" -eq 0 ] && [ "$DEPLOYMENT_HEALTH_INCLUDE_ZERO_DESIRED" = "true" ]; then
            UNHEALTHY=1
            REASON="desired=0"
          elif [ "$DESIRED_REPLICAS" -gt 0 ]; then
            READY_PERCENT=$((READY_REPLICAS * 100 / DESIRED_REPLICAS))
            if [ "$READY_PERCENT" -lt "$DEPLOYMENT_HEALTH_MIN_READY_PERCENT" ]; then
              UNHEALTHY=1
              REASON="ready=${READY_REPLICAS}/${DESIRED_REPLICAS}(${READY_PERCENT}%)"
            fi
          fi

          if [ "$UNHEALTHY" -eq 1 ]; then
            echo "$NS/$DEPLOYMENT_NAME $REASON"
          fi
        done)

        DEPLOYMENTS_HEALTH_REPORT=$(printf '%s\n' "$DEPLOYMENTS_HEALTH_REPORT" | sed '/^$/d' | head -n "$DEPLOYMENT_HEALTH_MAX_REPORTED_LINES")
        add_alert_section "DeploymentsHealth" "$DEPLOYMENTS_HEALTH_REPORT"
      fi
      {{- end }}
    }

    # Detection blocks: app stability checks + cluster stability checks.
    run_app_checks
    run_cluster_checks

    if [ -z "$ALERTS" ]; then
      echo "No issues"
      emit_runtime_metrics
      exit 0
    fi

    append_csv() {
      VAR_NAME="$1"
      VALUE="$2"
      eval "CURRENT=\${$VAR_NAME:-}"
      if [ -z "$CURRENT" ]; then
        eval "$VAR_NAME=\"$VALUE\""
      else
        eval "$VAR_NAME=\"$CURRENT,$VALUE\""
      fi
    }

    count_section_lines() {
      SECTION="$1"
      printf '%s\n' "$FULL_BODY" | awk -v sec="$SECTION" '
        $0 == "[" sec "]" { in_sec = 1; next }
        $0 ~ /^\[/ { in_sec = 0 }
        in_sec && NF { c++ }
        END { print c + 0 }
      '
    }

    render_section_lines() {
      SECTION="$1"
      LIMIT="$2"
      printf '%s\n' "$FULL_BODY" | awk -v sec="$SECTION" -v lim="$LIMIT" '
        $0 == "[" sec "]" { in_sec = 1; next }
        $0 ~ /^\[/ { in_sec = 0 }
        in_sec && NF {
          if (c < lim) {
            print
          }
          c++
        }
      '
    }

    FULL_BODY=$(printf '%b\n' "$ALERTS" | sed '/^$/d')
    CRASH_COUNT=$(count_section_lines "CrashLoop")
    IMAGE_COUNT=$(count_section_lines "ImagePull")
    ERROR_COUNT=$(count_section_lines "Errors")
    OOM_COUNT=$(count_section_lines "OOMKilled")
    EVICTED_COUNT=$(count_section_lines "Evicted")
    PENDING_UNSCHEDULABLE_COUNT=$(count_section_lines "PendingUnschedulable")
    PROBE_FAIL_COUNT=$(count_section_lines "ProbeFailures")
    WARNING_SURGE_COUNT=$(count_section_lines "WarningEventSurge")
    NODE_NOT_READY_COUNT=$(count_section_lines "NodeNotReady")
    NODE_PRESSURE_COUNT=$(count_section_lines "NodePressure")
    DEPLOYMENTS_HEALTH_COUNT=$(count_section_lines "DeploymentsHealth")
    POD_RESTART_COUNT=$(count_section_lines "PodRestarts")
    TOTAL_COUNT=$((CRASH_COUNT + IMAGE_COUNT + ERROR_COUNT + OOM_COUNT + EVICTED_COUNT + PENDING_UNSCHEDULABLE_COUNT + PROBE_FAIL_COUNT + WARNING_SURGE_COUNT + NODE_NOT_READY_COUNT + NODE_PRESSURE_COUNT + DEPLOYMENTS_HEALTH_COUNT + POD_RESTART_COUNT))

    DETECTED_ALERTS=""
    [ "$CRASH_COUNT" -gt 0 ] && append_csv DETECTED_ALERTS "CrashLoop:$CRASH_COUNT"
    [ "$IMAGE_COUNT" -gt 0 ] && append_csv DETECTED_ALERTS "ImagePull:$IMAGE_COUNT"
    [ "$ERROR_COUNT" -gt 0 ] && append_csv DETECTED_ALERTS "Errors:$ERROR_COUNT"
    [ "$OOM_COUNT" -gt 0 ] && append_csv DETECTED_ALERTS "OOMKilled:$OOM_COUNT"
    [ "$EVICTED_COUNT" -gt 0 ] && append_csv DETECTED_ALERTS "Evicted:$EVICTED_COUNT"
    [ "$PENDING_UNSCHEDULABLE_COUNT" -gt 0 ] && append_csv DETECTED_ALERTS "PendingUnschedulable:$PENDING_UNSCHEDULABLE_COUNT"
    [ "$PROBE_FAIL_COUNT" -gt 0 ] && append_csv DETECTED_ALERTS "ProbeFailures:$PROBE_FAIL_COUNT"
    [ "$WARNING_SURGE_COUNT" -gt 0 ] && append_csv DETECTED_ALERTS "WarningEventSurge:$WARNING_SURGE_COUNT"
    [ "$NODE_NOT_READY_COUNT" -gt 0 ] && append_csv DETECTED_ALERTS "NodeNotReady:$NODE_NOT_READY_COUNT"
    [ "$NODE_PRESSURE_COUNT" -gt 0 ] && append_csv DETECTED_ALERTS "NodePressure:$NODE_PRESSURE_COUNT"
    [ "$DEPLOYMENTS_HEALTH_COUNT" -gt 0 ] && append_csv DETECTED_ALERTS "DeploymentsHealth:$DEPLOYMENTS_HEALTH_COUNT"
    [ "$POD_RESTART_COUNT" -gt 0 ] && append_csv DETECTED_ALERTS "PodRestarts:$POD_RESTART_COUNT"
    [ -z "$DETECTED_ALERTS" ] && DETECTED_ALERTS="none"

    echo "Alert scan summary: total=$TOTAL_COUNT detected=$DETECTED_ALERTS"

    HASH=$(echo "$ALERTS" | md5sum | cut -d' ' -f1)
    if [ "$BACKOFF_FILTER_MODE" = "strict" ]; then
      SIMILAR_HASH="$HASH"
    else
      SIMILAR_KEY=$(printf '%b\n' "$ALERTS" | grep '^\[' | tr -d '[]' | tr '\n' '|' || true)
      if [ -z "$SIMILAR_KEY" ]; then
        SIMILAR_KEY="$HASH"
      fi
      SIMILAR_HASH=$(printf '%s' "$SIMILAR_KEY" | md5sum | cut -d' ' -f1)
    fi

    NOW=$(date +%s)
    LAST=$(cat $LAST_SENT_FILE 2>/dev/null || echo 0)

    if [ $((NOW - LAST)) -lt $COOLDOWN ]; then
      echo "Alert delivery: sent=0 skipped=cooldown_active total=$TOTAL_COUNT detected=$DETECTED_ALERTS"
      emit_runtime_metrics
      exit 0
    fi

    should_backoff_skip() {
      if [ "$BACKOFF_ENABLED" != "true" ]; then
        return 1
      fi

      if [ ! -f "$BACKOFF_FILE" ]; then
        return 1
      fi

      STORED_HASH=$(awk 'NR==1 {print $1}' "$BACKOFF_FILE" 2>/dev/null || true)
      NEXT_ALLOWED_TS=$(awk 'NR==1 {print $3}' "$BACKOFF_FILE" 2>/dev/null || echo 0)
      if [ "$STORED_HASH" = "$SIMILAR_HASH" ] && [ "$NOW" -lt "${NEXT_ALLOWED_TS:-0}" ]; then
        return 0
      fi
      return 1
    }

    next_backoff_delay() {
      CURRENT_LEVEL=$1
      VALUE=$BACKOFF_BASE_DELAY
      I=0
      while [ "$I" -lt "$CURRENT_LEVEL" ]; do
        VALUE=$((VALUE * BACKOFF_FACTOR))
        if [ "$VALUE" -ge "$BACKOFF_MAX_DELAY" ]; then
          VALUE=$BACKOFF_MAX_DELAY
          break
        fi
        I=$((I + 1))
      done
      echo "$VALUE"
    }

    if should_backoff_skip; then
      echo "Alert delivery: sent=0 skipped=backoff_active total=$TOTAL_COUNT detected=$DETECTED_ALERTS"
      emit_runtime_metrics
      exit 0
    fi

    TEMPLATE_MODE="${SMTP_MAIL_FORMAT:-structured}"
    if [ "$TEMPLATE_MODE" = "full" ]; then
      TEMPLATE_MODE="structured"
    elif [ "$TEMPLATE_MODE" = "short" ]; then
      TEMPLATE_MODE="compact"
    fi
    MAX_LINES="${SMTP_MAX_LINES_PER_SECTION:-5}"

    if [ "$NODE_NOT_READY_COUNT" -gt 0 ] || [ "$NODE_PRESSURE_COUNT" -gt 0 ] || [ "$DEPLOYMENTS_HEALTH_COUNT" -gt 0 ] || [ "$WARNING_SURGE_COUNT" -gt 0 ] || [ "$TOTAL_COUNT" -ge 10 ]; then
      SEVERITY="CRITICAL"
    elif [ "$OOM_COUNT" -gt 0 ] || [ "$EVICTED_COUNT" -gt 0 ] || [ "$PENDING_UNSCHEDULABLE_COUNT" -gt 0 ] || [ "$PROBE_FAIL_COUNT" -gt 0 ] || [ "$TOTAL_COUNT" -ge 4 ]; then
      SEVERITY="HIGH"
    elif [ "$TOTAL_COUNT" -ge 2 ]; then
      SEVERITY="MEDIUM"
    else
      SEVERITY="LOW"
    fi

    SUBJECT_PREFIX="${SMTP_SUBJECT_PREFIX:-K3S ALERT}"
    SUBJECT="$SUBJECT_PREFIX $SEVERITY CrashLoop:$CRASH_COUNT ImagePull:$IMAGE_COUNT Errors:$ERROR_COUNT OOMKilled:$OOM_COUNT Evicted:$EVICTED_COUNT PendingUnschedulable:$PENDING_UNSCHEDULABLE_COUNT ProbeFailures:$PROBE_FAIL_COUNT WarningEventSurge:$WARNING_SURGE_COUNT NodeNotReady:$NODE_NOT_READY_COUNT NodePressure:$NODE_PRESSURE_COUNT DeploymentsHealth:$DEPLOYMENTS_HEALTH_COUNT PodRestarts:$POD_RESTART_COUNT"

    if [ "$TEMPLATE_MODE" = "compact" ]; then
      BODY="Summary: severity=$SEVERITY total=$TOTAL_COUNT crashloop=$CRASH_COUNT imagepull=$IMAGE_COUNT errors=$ERROR_COUNT oomKilled=$OOM_COUNT evicted=$EVICTED_COUNT pendingUnschedulable=$PENDING_UNSCHEDULABLE_COUNT probeFailures=$PROBE_FAIL_COUNT warningEventSurge=$WARNING_SURGE_COUNT nodeNotReady=$NODE_NOT_READY_COUNT nodePressure=$NODE_PRESSURE_COUNT deploymentsHealth=$DEPLOYMENTS_HEALTH_COUNT podRestarts=$POD_RESTART_COUNT\n\nTop lines:\n$(printf '%s\n' "$FULL_BODY" | head -n 8)"
    else
      BODY="K3S Alert Summary\nGeneratedAt: $(date -u +%Y-%m-%dT%H:%M:%SZ)\nSeverity: $SEVERITY\nTotalIssues: $TOTAL_COUNT\n\nBreakdown:\n- CrashLoop: $CRASH_COUNT\n- ImagePull: $IMAGE_COUNT\n- Errors: $ERROR_COUNT\n- OOMKilled: $OOM_COUNT\n- Evicted: $EVICTED_COUNT\n- PendingUnschedulable: $PENDING_UNSCHEDULABLE_COUNT\n- ProbeFailures: $PROBE_FAIL_COUNT\n- WarningEventSurge: $WARNING_SURGE_COUNT\n- NodeNotReady: $NODE_NOT_READY_COUNT\n- NodePressure: $NODE_PRESSURE_COUNT\n- DeploymentsHealth: $DEPLOYMENTS_HEALTH_COUNT\n- PodRestarts: $POD_RESTART_COUNT\n"

      if [ "$CRASH_COUNT" -gt 0 ]; then
        BODY="$BODY\n\n[CrashLoop]\n$(render_section_lines "CrashLoop" "$MAX_LINES")"
      fi
      if [ "$IMAGE_COUNT" -gt 0 ]; then
        BODY="$BODY\n\n[ImagePull]\n$(render_section_lines "ImagePull" "$MAX_LINES")"
      fi
      if [ "$ERROR_COUNT" -gt 0 ]; then
        BODY="$BODY\n\n[Errors]\n$(render_section_lines "Errors" "$MAX_LINES")"
      fi
      if [ "$OOM_COUNT" -gt 0 ]; then
        BODY="$BODY\n\n[OOMKilled]\n$(render_section_lines "OOMKilled" "$MAX_LINES")"
      fi
      if [ "$EVICTED_COUNT" -gt 0 ]; then
        BODY="$BODY\n\n[Evicted]\n$(render_section_lines "Evicted" "$MAX_LINES")"
      fi
      if [ "$PENDING_UNSCHEDULABLE_COUNT" -gt 0 ]; then
        BODY="$BODY\n\n[PendingUnschedulable]\n$(render_section_lines "PendingUnschedulable" "$MAX_LINES")"
      fi
      if [ "$PROBE_FAIL_COUNT" -gt 0 ]; then
        BODY="$BODY\n\n[ProbeFailures]\n$(render_section_lines "ProbeFailures" "$MAX_LINES")"
      fi
      if [ "$WARNING_SURGE_COUNT" -gt 0 ]; then
        BODY="$BODY\n\n[WarningEventSurge]\n$(render_section_lines "WarningEventSurge" "$MAX_LINES")"
      fi
      if [ "$NODE_NOT_READY_COUNT" -gt 0 ]; then
        BODY="$BODY\n\n[NodeNotReady]\n$(render_section_lines "NodeNotReady" "$MAX_LINES")"
      fi
      if [ "$NODE_PRESSURE_COUNT" -gt 0 ]; then
        BODY="$BODY\n\n[NodePressure]\n$(render_section_lines "NodePressure" "$MAX_LINES")"
      fi
      if [ "$DEPLOYMENTS_HEALTH_COUNT" -gt 0 ]; then
        BODY="$BODY\n\n[DeploymentsHealth]\n$(render_section_lines "DeploymentsHealth" "$MAX_LINES")"
      fi
      if [ "$POD_RESTART_COUNT" -gt 0 ]; then
        BODY="$BODY\n\n[PodRestarts]\n$(render_section_lines "PodRestarts" "$MAX_LINES")"
      fi

      BODY="$BODY\n\nControls: cooldown=${COOLDOWN}s, backoff=${BACKOFF_ENABLED}/${BACKOFF_FILTER_MODE}, rateLimit=${RATE_LIMIT_ENABLED}(${RATE_LIMIT_MAX_EMAILS}/${RATE_LIMIT_PERIOD}s)"
    fi

    json_escape() {
      printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g; :a;N;$!ba;s/\n/\\n/g; s/\r/\\r/g'
    }

    can_send_email() {
      if [ "$RATE_LIMIT_ENABLED" != "true" ]; then
        return 0
      fi

      NOW_TS=$(date +%s)
      WINDOW_START=$((NOW_TS - RATE_LIMIT_PERIOD))

      if [ -f "$EMAIL_RATE_FILE" ]; then
        awk -v min="$WINDOW_START" '$1 >= min { print $1 }' "$EMAIL_RATE_FILE" > "${EMAIL_RATE_FILE}.tmp" || true
        mv "${EMAIL_RATE_FILE}.tmp" "$EMAIL_RATE_FILE"
      else
        : > "$EMAIL_RATE_FILE"
      fi

      SENT_COUNT=$(wc -l < "$EMAIL_RATE_FILE" | tr -d ' ')
      if [ "$SENT_COUNT" -ge "$RATE_LIMIT_MAX_EMAILS" ]; then
        return 1
      fi

      echo "$NOW_TS" >> "$EMAIL_RATE_FILE"
      return 0
    }

    mark_restart_threshold_notified() {
      if [ -z "${RESTART_ALERT_TARGETS:-}" ]; then
        return 0
      fi

      printf '%b\n' "$RESTART_ALERT_TARGETS" | while IFS='|' read -r ns pod; do
        [ -z "$ns" ] && continue
        [ -z "$pod" ] && continue
        run_kubectl annotate pod "$pod" -n "$ns" k3s-alert/restart-threshold-notified=true --overwrite >/dev/null || true
      done
    }

    SENT_ANY=0
    SENT_CHANNELS=""
    SKIPPED_REASONS=""

    {{- if .Values.channels.email.enabled }}
    if [ -n "${SMTP_HOST:-}" ] && [ -n "${SMTP_TO:-}" ] && [ -n "${SMTP_USERNAME:-}" ] && [ -n "${SMTP_PASSWORD:-}" ]; then
      RECIPIENTS=$(printf '%s' "$SMTP_TO" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d')
      if [ -z "$RECIPIENTS" ]; then
        echo "No valid SMTP recipients found"
        append_csv SKIPPED_REASONS "email_no_recipients"
        exit 0
      fi

      set --
      for recipient in $RECIPIENTS; do
        set -- "$@" --mail-rcpt "$recipient"
      done

      if ! can_send_email; then
        echo "Email rate limit active: max $RATE_LIMIT_MAX_EMAILS emails per $RATE_LIMIT_PERIOD seconds"
        append_csv SKIPPED_REASONS "email_rate_limited"
      else
        if [ -n "${SMTP_LOGIN_OPTIONS:-}" ]; then
          echo -e "Subject: $SUBJECT\n\n$BODY" | curl -sS --connect-timeout 10 --max-time 20 --url "smtp://$SMTP_HOST:$SMTP_PORT" \
            --ssl-reqd \
            --mail-from "$SMTP_FROM" \
            "$@" \
            --login-options "$SMTP_LOGIN_OPTIONS" \
            --upload-file - \
            --user "$SMTP_USERNAME:$SMTP_PASSWORD" >/dev/null
        else
          echo -e "Subject: $SUBJECT\n\n$BODY" | curl -sS --connect-timeout 10 --max-time 20 --url "smtp://$SMTP_HOST:$SMTP_PORT" \
            --ssl-reqd \
            --mail-from "$SMTP_FROM" \
            "$@" \
            --upload-file - \
            --user "$SMTP_USERNAME:$SMTP_PASSWORD" >/dev/null
        fi
        echo "Email alert sent"
        SENT_ANY=1
        append_csv SENT_CHANNELS "email"
      fi
    else
      echo "Email channel enabled but required SMTP vars are missing"
      append_csv SKIPPED_REASONS "email_missing_config"
    fi
    {{- end }}

    {{- if .Values.channels.webhook.enabled }}
    if [ -n "${WEBHOOK_URL:-}" ]; then
      PAYLOAD=$(printf '{"subject":"%s","message":"%s"}' "$(json_escape "$SUBJECT")" "$(json_escape "$BODY")")
      curl -sS --connect-timeout 10 --max-time 20 -X POST "$WEBHOOK_URL" \
        -H "Content-Type: application/json" \
        -d "$PAYLOAD" >/dev/null
      echo "Webhook alert sent"
      SENT_ANY=1
      append_csv SENT_CHANNELS "webhook"
    else
      echo "Webhook channel enabled but WEBHOOK_URL is empty"
      append_csv SKIPPED_REASONS "webhook_missing_url"
    fi
    {{- end }}

    if [ "$SENT_ANY" -eq 1 ]; then
      [ -z "$SENT_CHANNELS" ] && SENT_CHANNELS="unknown"
      [ -z "$SKIPPED_REASONS" ] && SKIPPED_REASONS="none"
      echo "Alert delivery: sent=1 channels=$SENT_CHANNELS skipped=$SKIPPED_REASONS total=$TOTAL_COUNT detected=$DETECTED_ALERTS"
      mark_restart_threshold_notified

      echo "$HASH" > "$STATE_FILE"
      echo "$NOW" > "$LAST_SENT_FILE"

      if [ "$BACKOFF_ENABLED" = "true" ]; then
        STORED_HASH=$(awk 'NR==1 {print $1}' "$BACKOFF_FILE" 2>/dev/null || true)
        STORED_LEVEL=$(awk 'NR==1 {print $2}' "$BACKOFF_FILE" 2>/dev/null || echo 0)
        if [ "$STORED_HASH" = "$SIMILAR_HASH" ]; then
          NEXT_LEVEL=$((STORED_LEVEL + 1))
        else
          NEXT_LEVEL=0
        fi
        DELAY=$(next_backoff_delay "$NEXT_LEVEL")
        NEXT_ALLOWED=$((NOW + DELAY))
        echo "$SIMILAR_HASH $NEXT_LEVEL $NEXT_ALLOWED" > "$BACKOFF_FILE"
      fi
    else
      [ -z "$SKIPPED_REASONS" ] && SKIPPED_REASONS="no_channel_sent"
      echo "Alert delivery: sent=0 skipped=$SKIPPED_REASONS total=$TOTAL_COUNT detected=$DETECTED_ALERTS"
    fi

    emit_runtime_metrics
