schedule:
  type: interval
  cron: null
  intervalMinutes: 2
  intervalHours: null
  intervalDays: null

image:
  repository: alpine/k8s
  tag: "1.31.8"

cronJob:
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  activeDeadlineSeconds: 100

channels:
  email:
    enabled: true
    host: ""
    port: "587"
    from: ""
    to: ""
    loginOptions: ""
    mailFormat: structured
    subjectPrefix: "K3S ALERT"
    maxLinesPerSection: 5
    username: null
    password: null
  webhook:
    enabled: false
    url: null

cooldownSeconds: 60
logLevel: info

backoff:
  enabled: true
  filterMode: strict
  baseDelaySeconds: 120
  factor: 2
  maxDelaySeconds: 36000

rateLimit:
  enabled: true
  periodSeconds: 900
  maxEmails: 5

alerts:
  podCrashLoop: true
  podImagePullError: true
  podError: true
  podOOMKilled: true
  podEvicted: true
  podRestartThreshold: 2
  pendingUnschedulable: true
  pendingUnschedulableMinPods: 1
  warningEventsSurge: false
  warningEventsSurgeThreshold: 25
  probeFailures: true
  nodeNotReady: true
  nodePressure: true
  deploymentsHealthCheck: true

deploymentsHealthCheck:
  targets:
    - kube-system/coredns
    - kube-system/metrics-server
    - kube-system/local-path-provisioner
  settings:
    minReadyPercent: 100
    includeZeroDesired: true
    maxReportedLines: 10
    includeMissingTargets: true

filters:
  excludeNamespaces:
    - kube-system
    - kube-public

resources:
  requests:
    memory: "20Mi"
    cpu: "5m"
  limits:
    memory: "40Mi"
    cpu: "50m"
